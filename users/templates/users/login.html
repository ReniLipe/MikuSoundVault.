{% extends 'base.html' %}
{% block title %}Login - MikuSoundVault{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <img src="/media/mascotte/miku.jpg" alt="Miku" style="width: 80px;">
                <h3 class="mt-2 fw-bold" style="color: var(--miku-teal);">Bentornato!</h3>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-miku w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Accedi
                </button>
            </form>
            <p class="text-center mt-3 text-secondary">
                Non hai un account? 
                <a href="/users/register/" style="color: var(--miku-teal);">Registrati</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
